services:
  defense-kit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: defense-kit
    hostname: defense-kit
    volumes:
      - ${TARGET_PATH:-.}:/defense-kit/target:ro
      - ./outputs:/defense-kit/outputs
      - ./policies:/defense-kit/policies:ro
    environment:
      - TERM=xterm-256color
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    stdin_open: true
    tty: true
